<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{% block subject %}TerraTrail{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      color-scheme: light dark;
    }

    * { box-sizing: border-box; }

    body, html {
      margin: 0; padding: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      background-color: #f0f2f5;
      color: #111827;
    }

    .email-wrapper {
      background-color: #f0f2f5;
      padding: 32px 16px 48px;
      min-height: 100vh;
    }

    .email-card {
      max-width: 580px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    /* ── Header ── */
    .email-header {
      background: linear-gradient(135deg, #065f46 0%, #059669 60%, #10b981 100%);
      padding: 32px 40px 28px;
      position: relative;
      overflow: hidden;
    }
    .email-header::before {
      content: "";
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .email-header::after {
      content: "";
      position: absolute;
      bottom: -60px; left: -20px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .header-inner {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 14px;
    }
    .brand-logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
    .brand-text { color: #ffffff; }
    .brand-name {
      font-size: 18px; font-weight: 800;
      letter-spacing: -0.4px; line-height: 1.2;
    }
    .brand-sub {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    /* ── Body ── */
    .email-body {
      padding: 36px 40px 32px;
    }

    .email-title {
      font-size: 22px; font-weight: 800;
      color: #0f172a;
      margin: 0 0 10px;
      letter-spacing: -0.4px;
      line-height: 1.3;
    }
    .email-text {
      font-size: 15px; color: #475569;
      line-height: 1.75; margin: 0 0 16px;
    }
    .email-text strong { color: #1e293b; }

    /* ── Button ── */
    .btn-primary-email {
      display: inline-block;
      background: linear-gradient(135deg, #059669, #047857);
      color: #ffffff !important;
      text-decoration: none !important;
      font-weight: 700; font-size: 14px;
      padding: 13px 28px;
      border-radius: 10px;
      margin: 20px 0 8px;
      letter-spacing: 0.1px;
      box-shadow: 0 4px 12px rgba(5,150,105,0.3);
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 24px 0;
    }

    /* ── OTP box ── */
    .otp-box {
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 2px solid #bbf7d0;
      border-radius: 16px;
      text-align: center;
      padding: 28px 24px;
      margin: 20px 0;
    }
    .otp-code {
      font-size: 48px; font-weight: 800;
      letter-spacing: 14px; color: #059669;
      font-variant-numeric: tabular-nums;
    }
    .otp-expire {
      font-size: 13px; color: #64748b; margin-top: 10px;
    }

    /* ── Info table ── */
    .info-table {
      width: 100%; border-collapse: separate;
      border-spacing: 0; margin: 18px 0;
      border: 1px solid #e2e8f0;
      border-radius: 12px; overflow: hidden;
    }
    .info-table td {
      padding: 12px 16px; font-size: 14px;
      border-bottom: 1px solid #f1f5f9;
    }
    .info-table tr:last-child td { border-bottom: none; }
    .info-table td:first-child {
      color: #64748b; font-weight: 500; width: 42%;
      background: #f8fafc;
    }
    .info-table td:last-child { color: #0f172a; font-weight: 600; }

    /* ── Highlight box ── */
    .highlight-box {
      background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
      border: 1px solid #a7f3d0;
      border-left: 5px solid #059669;
      border-radius: 12px;
      padding: 18px 22px; margin: 18px 0;
    }
    .highlight-box .amount {
      font-size: 28px; font-weight: 800;
      color: #059669; letter-spacing: -0.5px;
    }
    .highlight-box .label {
      font-size: 13px; color: #64748b; margin-top: 3px;
    }

    /* ── Alert box ── */
    .alert-box {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-left: 5px solid #f97316;
      border-radius: 12px;
      padding: 14px 18px; margin: 18px 0;
      font-size: 14px; color: #9a3412;
    }

    /* ── Badges ── */
    .badge-success {
      background: #dcfce7; color: #15803d;
      border: 1px solid #bbf7d0;
      border-radius: 100px; padding: 5px 14px;
      font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .badge-danger {
      background: #fee2e2; color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 100px; padding: 5px 14px;
      font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .badge-warning {
      background: #fef9c3; color: #854d0e;
      border: 1px solid #fde047;
      border-radius: 100px; padding: 5px 14px;
      font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .badge-info {
      background: #eff6ff; color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 100px; padding: 5px 14px;
      font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 5px;
    }

    /* ── Footer ── */
    .email-footer {
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      padding: 22px 40px 24px;
      text-align: center;
    }
    .email-footer p {
      font-size: 12px; color: #94a3b8;
      margin: 0; line-height: 1.7;
    }
    .email-footer a { color: #059669; text-decoration: none; }
    .footer-logo {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 10px;
    }
    .footer-logo-icon {
      width: 22px; height: 22px;
      border-radius: 6px; overflow: hidden;
      background: #059669;
    }
    .footer-logo-icon img { width: 100%; height: 100%; object-fit: cover; }
    .footer-brand { font-size: 13px; font-weight: 700; color: #475569; }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      body, .email-wrapper { background-color: #0f172a !important; }
      .email-card { background: #1e293b !important; box-shadow: 0 4px 24px rgba(0,0,0,0.4) !important; }
      .email-title { color: #f1f5f9 !important; }
      .email-text { color: #94a3b8 !important; }
      .email-text strong { color: #e2e8f0 !important; }
      .email-body { background: #1e293b !important; }
      .info-table { border-color: #334155 !important; }
      .info-table td { border-bottom-color: #293548 !important; color: #e2e8f0 !important; }
      .info-table td:first-child { background: #263044 !important; color: #94a3b8 !important; }
      .info-table td:last-child { color: #f1f5f9 !important; }
      .highlight-box { background: #12302b !important; border-color: #065f46 !important; }
      .alert-box { background: #2c1508 !important; border-color: #7c2d12 !important; }
      .otp-box { background: linear-gradient(135deg, #12302b, #064e3b) !important; border-color: #065f46 !important; }
      .email-footer { background: #162032 !important; border-top-color: #334155 !important; }
      .email-footer p { color: #64748b !important; }
      .footer-brand { color: #94a3b8 !important; }
      .divider { border-top-color: #334155 !important; }
    }

    @media (max-width: 600px) {
      .email-body, .email-header, .email-footer { padding: 24px 20px !important; }
      .otp-code { font-size: 36px !important; letter-spacing: 10px !important; }
      .email-title { font-size: 20px !important; }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-card">

      <div class="email-header">
        <div class="header-inner">
          <div class="brand-logo">
            <img src="https://terratrail.co/logo.png" alt="TerraTrail Logo" />
          </div>
          <div class="brand-text">
            <div class="brand-name">TerraTrail</div>
            {% if workspace_name %}
            <div class="brand-sub">{{ workspace_name }}</div>
            {% else %}
            <div class="brand-sub">Real Estate Management Platform</div>
            {% endif %}
          </div>
        </div>
      </div>

      <div class="email-body">
        {% block body %}{% endblock %}
      </div>

      <div class="email-footer">
        <div class="footer-logo">
          <div class="footer-logo-icon">
            <img src="https://terratrail.co/logo.png" alt="" />
          </div>
          <span class="footer-brand">TerraTrail</span>
        </div>
        <p>
          &copy; {{ year }} TerraTrail &mdash; Real Estate Management Platform<br>
          {% if support_email %}
          Questions? <a href="mailto:{{ support_email }}">{{ support_email }}</a>
          {% endif %}
        </p>
      </div>

    </div>
  </div>
</body>
</html>
