<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}TerraTrail{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    body, html {
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      color: #111827;
    }
    .email-wrapper {
      background-color: #f3f4f6;
      padding: 40px 16px;
    }
    .email-card {
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      overflow: hidden;
    }
    .email-header {
      background: #059669;
      padding: 28px 40px;
      text-align: center;
    }
    .email-header .brand {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
    }
    .email-header .brand-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      margin-top: 3px;
    }
    .email-body {
      padding: 36px 40px;
    }
    .email-title {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin: 0 0 12px;
    }
    .email-text {
      font-size: 15px;
      color: #374151;
      line-height: 1.7;
      margin: 0 0 16px;
    }
    .btn-primary-email {
      display: inline-block;
      background: #059669;
      color: #ffffff !important;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 10px;
      margin: 20px 0;
      border: none;
    }
    .btn-primary-email:hover {
      background: #047857;
    }
    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 24px 0;
    }
    .otp-box {
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      border-radius: 12px;
      text-align: center;
      padding: 24px;
      margin: 20px 0;
    }
    .otp-code {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 12px;
      color: #059669;
    }
    .otp-expire {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
    .info-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    .info-table td {
      padding: 11px 16px;
      font-size: 14px;
      border-bottom: 1px solid #f3f4f6;
      color: #111827;
    }
    .info-table tr:last-child td {
      border-bottom: none;
    }
    .info-table td:first-child {
      color: #6b7280;
      font-weight: 500;
      width: 40%;
      background: #f9fafb;
    }
    .info-table td:last-child {
      color: #111827;
      font-weight: 600;
    }
    .badge-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
    }
    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
    }
    .badge-warning {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
    }
    .highlight-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-left: 4px solid #059669;
      border-radius: 8px;
      padding: 16px 20px;
      margin: 16px 0;
    }
    .highlight-box .amount {
      font-size: 26px;
      font-weight: 700;
      color: #059669;
    }
    .highlight-box .label {
      font-size: 13px;
      color: #6b7280;
      margin-top: 2px;
    }
    .email-footer {
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      padding: 20px 40px;
      text-align: center;
    }
    .email-footer p {
      font-size: 12px;
      color: #9ca3af;
      margin: 0;
      line-height: 1.6;
    }
    .email-footer a {
      color: #059669;
      text-decoration: none;
    }
    @media (max-width: 600px) {
      .email-body, .email-header, .email-footer { padding: 24px 20px; }
      .otp-code { font-size: 32px; letter-spacing: 8px; }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-card">
      <div class="email-header">
        <div class="brand">🌿 TerraTrail</div>
        {% if workspace_name %}
        <div class="brand-sub">{{ workspace_name }}</div>
        {% endif %}
      </div>

      <div class="email-body">
        {% block body %}{% endblock %}
      </div>

      <div class="email-footer">
        <p>
          &copy; {{ year }} TerraTrail &mdash; Real Estate Management Platform<br>
          {% if support_email %}
          Need help? <a href="mailto:{{ support_email }}">{{ support_email }}</a>
          {% endif %}
        </p>
      </div>
    </div>
  </div>
</body>
</html>
