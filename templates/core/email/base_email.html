<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}TerraTrail{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      font-family: 'Outfit', Arial, sans-serif;
      color: #e2e8f0;
    }
    .email-wrapper {
      background-color: #0f172a;
      padding: 40px 16px;
    }
    .email-card {
      max-width: 560px;
      margin: 0 auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
    }
    .email-header {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      padding: 32px 40px;
      text-align: center;
    }
    .email-header .brand {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .email-header .brand span {
      opacity: 0.85;
      font-weight: 300;
    }
    .email-body {
      padding: 36px 40px;
    }
    .email-title {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
    }
    .email-text {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .btn-primary-email {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: #ffffff !important;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 12px;
      margin: 20px 0;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 24px 0;
    }
    .otp-box {
      background: rgba(99,102,241,0.12);
      border: 2px solid rgba(99,102,241,0.4);
      border-radius: 14px;
      text-align: center;
      padding: 24px;
      margin: 20px 0;
    }
    .otp-code {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 10px;
      color: #a78bfa;
    }
    .otp-expire {
      font-size: 13px;
      color: #64748b;
      margin-top: 8px;
    }
    .info-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
    }
    .info-table td {
      padding: 10px 14px;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .info-table td:first-child {
      color: #64748b;
      width: 42%;
    }
    .info-table td:last-child {
      color: #e2e8f0;
      font-weight: 600;
    }
    .badge-success {
      background: rgba(16,185,129,0.15);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
    }
    .badge-danger {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
    }
    .badge-warning {
      background: rgba(245,158,11,0.15);
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
    }
    .email-footer {
      background: rgba(0,0,0,0.2);
      padding: 24px 40px;
      text-align: center;
    }
    .email-footer p {
      font-size: 12px;
      color: #475569;
      margin: 0;
      line-height: 1.6;
    }
    .email-footer a {
      color: #6366f1;
      text-decoration: none;
    }
    @media (max-width: 600px) {
      .email-body, .email-header, .email-footer { padding: 24px 20px; }
      .otp-code { font-size: 32px; letter-spacing: 6px; }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-card">
      <div class="email-header">
        <div class="brand">Terra<span>Trail</span></div>
        {% if workspace_name %}
        <div style="font-size:13px; color:rgba(255,255,255,0.7); margin-top:4px;">{{ workspace_name }}</div>
        {% endif %}
      </div>

      <div class="email-body">
        {% block body %}{% endblock %}
      </div>

      <div class="email-footer">
        <p>
          &copy; {{ year }} TerraTrail SaaS &mdash; All rights reserved.<br>
          {% if support_email %}
          Questions? <a href="mailto:{{ support_email }}">{{ support_email }}</a>
          {% endif %}
        </p>
      </div>
    </div>
  </div>
</body>
</html>
