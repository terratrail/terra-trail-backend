databases:
  - name: terratrail-db
    databaseName: terratrail
    user: terratrail
    plan: free

services:
  # ── Web (Gunicorn) ────────────────────────────────────────────────────────
  - type: web
    name: terratrail-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput --settings=terratrail.settings.base
    startCommand: chmod +x scripts/start.sh && ./scripts/start.sh
    plan: free
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: terratrail.settings
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: terratrail-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.terratrail.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://app.terratrail.com,https://terratrail.vercel.app"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "demiladebamgboye@gmail.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      # Set these manually in Render dashboard:
      # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_STORAGE_BUCKET_NAME
      # CELERY_BROKER_URL (Redis URL from Render Redis or Upstash)
      # EMAIL_HOST, EMAIL_HOST_USER, EMAIL_HOST_PASSWORD, DEFAULT_FROM_EMAIL
