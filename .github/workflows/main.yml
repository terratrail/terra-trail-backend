name: TerraTrail CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: terratrail_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-django coverage

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Run Migrations
      env:
        DATABASE_URL: postgres://postgres:password@localhost:5432/terratrail_test
        SECRET_KEY: test_secret_key_ci_cd_pipeline_unique
        DEBUG: 'True'
        DJANGO_SETTINGS_MODULE: terratrail.settings.base
      run: |
        python manage.py migrate --noinput

    - name: Run Tests with Coverage
      env:
        DATABASE_URL: postgres://postgres:password@localhost:5432/terratrail_test
        SECRET_KEY: test_secret_key_ci_cd_pipeline_unique
        DEBUG: 'True'
        DJANGO_SETTINGS_MODULE: terratrail.settings.base
      run: |
        coverage run manage.py test
        coverage report
        
